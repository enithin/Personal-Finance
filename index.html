<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinSwift AI Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div id="auth-container" class="container">
        <div class="stats-card auth-card">
            <h1>FinSwift AI</h1>
            <p id="auth-msg" style="color: #f43f5e; font-size: 14px;"></p>
            <input type="email" id="email" placeholder="Email Address">
            <input type="password" id="password" placeholder="Password">
            
            <button onclick="window.handleAuth('login')">Sign In</button>
            <button onclick="window.handleAuth('signup')" class="secondary">Create Account</button>
        </div>
    </div>

    <div id="app-container" class="container" style="display:none;">
        <header class="stats-card header-flex">
            <div id="user-profile">
                <span id="user-name" style="font-weight: 800;">Welcome!</span>
            </div>
            <button onclick="window.logout()" class="small-btn" style="background: #f43f5e;">Logout</button>
        </header
