<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinSwift AI - Personal Finance</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
    <div id="auth-container" class="container">
        <h1>FinSwift AI</h1>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button id="login-btn">Login</button>
        <button id="signup-btn" class="secondary">Sign Up</button>
    </div>

    <div id="app-container" class="container" style="display:none;">
        <header>
            <h1>My Dashboard</h1>
            <button id="logout-btn">Logout</button>
        </header>

        <div class="grid">
            <section>
                <form id="expense-form">
                    <h3>Add Expense</h3>
                    <input type="text" id="desc" placeholder="Description" required>
                    <input type="number" id="amount" placeholder="Amount (₹)" required>
                    <select id="category">
                        <option value="Food">Food</option>
                        <option value="Transport">Transport</option>
                        <option value="Rent">Rent</option>
                        <option value="Entertainment">Entertainment</option>
                        <option value="Health">Health</option>
                    </select>
                    <input type="file" id="receipt-upload" accept="image/*">
                    <button type="button" id="scan-btn">🔍 AI Scan Receipt</button>
                    <label><input type="checkbox" id="is-recurring"> Recurring Monthly?</label>
                    <button type="submit" id="submit-btn">Add Expense</button>
                </form>

                <div id="budget-settings">
                    <h3>🎯 Set Budget</h3>
                    <select id="budget-category">
                        <option value="Food">Food</option>
                        <option value="Transport">Transport</option>
                        <option value="Rent">Rent</option>
                        <option value="Entertainment">Entertainment</option>
                    </select>
                    <input type="number" id="budget-val" placeholder="Limit (₹)">
                    <button onclick="saveBudget()">Set Limit</button>
                </div>
            </section>

            <section>
                <div class="controls">
                    <input type="month" id="month-picker">
                    <button onclick="downloadPDF()">📄 Export PDF</button>
                </div>
                
                <div class="stats-card">
                    <h2>Total: <span id="total-amount">₹0</span></h2>
                    <canvas id="expenseChart"></canvas>
                </div>
