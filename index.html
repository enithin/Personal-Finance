<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinSwift Pro | Ready to Deploy</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="script.js" defer></script>
</head>
<body>
    <div id="auth-container" class="container">
        <div class="stats-card auth-card">
            <h1>FinSwift AI</h1>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password">
            <button onclick="window.handleAuth('login')">Sign In</button>
            <button onclick="window.handleAuth('signup')" class="secondary">Create Account</button>
        </div>
    </div>

    <div id="app-container" class="container" style="display:none;">
        <header class="stats-card header-flex">
            <span id="user-name" style="font-weight:800;">FinSwift Dashboard</span>
            <div>
                <button onclick="window.downloadPDF()" class="small-btn" style="background:#a855f7;">📄 Export PDF</button>
                <button onclick="window.logout()" class="small-btn">Logout</button>
            </div>
        </header>

        <div class="grid">
            <section class="stack">
                <div class="stats-card balance-card">
                    <small>Monthly Net Balance</small>
                    <h2 id="net-balance">₹0.00</h2>
                </div>

                <div class="stats-card">
                    <h3>💰 Add Income</h3>
                    <input type="text" id="inc-source" placeholder="Source">
                    <input type="number" id="inc-amount" placeholder="Amount (₹)">
                    <button onclick="window.addIncome()" style="background:#10b981;">Save Income</button>
                </div>

                <div class="stats-card">
                    <h3>💸 Add Expense</h3>
                    <input type="text" id="exp-desc" placeholder="Description">
                    <input type="number" id="exp-amount" placeholder="Amount (₹)">
                    <select id="exp-cat">
                        <option value="Food">Food</option>
                        <option value="Rent">Rent</option>
                        <option value="Bills">Bills</option>
                        <option value="Fun">Fun</option>
                    </select>
                    <input type="file" id="exp-bill" accept="image/*" style="font-size: 10px; margin-top:5px;">
                    <button onclick="window.addExpense()">Save Expense</button>
                </div>
                <div class="stats-card">
    <h3>🎯 Set Monthly Budget</h3>
    <div class="vibrant-form">
        <select id="budget-cat-set">
            <option value="Food">Food</option>
            <option value="Rent">Rent</option>
            <option value="Bills">Bills</option>
            <option value="Fun">Fun</option>
        </select>
        <input type="number" id="budget-amt-set" placeholder="Limit (₹)">
        <button onclick="window.saveBudget()" style="background: #6366f1;">Update Budget</button>
    </div>
</div>
            </section>

            <section class="stack">
                <div class="stats-card">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                        <h3>Analysis</h3>
                        <input type="month" id="month-picker" onchange="window.fetchData()" style="width:auto;">
                    </div>
                    <canvas id="expenseChart"></canvas>
                </div>
<div id="budget-status" class="stats-card">
    <h3>Budget Progress</h3>
    </div>
                <div class="stats-card">
                    <h3>📊 Transaction History</h3>
                    <input type="text" id="search-bar" placeholder="🔍 Search description..." oninput="window.renderUIFromCache()" style="margin-bottom:10px;">
                    <div id="income-list"></div>
                    <hr style="opacity:0.1; margin:15px 0;">
                    <div id="expense-list"></div>
                </div>
            </section>
        </div>
    </div>
</body>
</html>
