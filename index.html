<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinSwift AI | Vibrant Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div id="auth-container" class="container">
        <div class="stats-card auth-card">
            <h1>FinSwift AI</h1>
            <p id="auth-msg"></p>
            <input type="email" id="email" placeholder="Email Address">
            <input type="password" id="password" placeholder="Password">
            <button id="login-btn">Sign In</button>
            <button id="signup-btn" class="secondary">Create Account</button>
            <div class="divider">OR</div>
            <button id="google-btn" class="google-style">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
                Continue with Google
            </button>
        </div>
    </div>

    <div id="app-container" class="container" style="display:none;">
        
        <header class="stats-card header-flex">
            <div id="user-profile">
                <img id="user-avatar" src="" alt="Profile">
                <div>
                    <span id="user-name">Welcome back!</span>
                </div>
            </div>
            <button id="logout-btn" class="small-btn">Logout</button>
        </header>

        <div class="grid">
            
            <section class="stack">
                
                <div class="stats-card balance-card">
                    <small>Available Balance</small>
                    <h2 id="net-balance">₹0.00</h2>
                </div>

                <form id="income-form" class="stats-card vibrant-form">
                    <h3>💰 Add Income</h3>
                    <input type="text" id="income-source" placeholder="Source (e.g., Salary)" required>
                    <input type="number" id="income-amount" placeholder="Amount (₹)" required>
                    <button type="submit" class="income-btn">Add Income</button>
                </form>

                <form id="expense-form" class="stats-card vibrant-form">
                    <h3>💸 Add Expense</h3>
                    <input type="text" id="desc" placeholder="What was it for?" required>
                    <input type="number" id="amount" placeholder="Amount (₹)" required>
                    <select id="category">
                        <option value="Food">Food</option>
                        <option value="Transport">Transport</option>
                        <option value="Rent">Rent</option>
                        <option value="Entertainment">Entertainment</option>
                    </select>
                    <button type="submit">Add Expense</button>
                </form>
            </section>

            <section class="stack">
                <div class="stats-card">
                    <div class="controls">
                        <input type="month" id="month-picker" onchange="fetchExpenses()">
                    </div>
                    <canvas id="expenseChart"></canvas>
                </div>

                <div id="budget-status" class="stats-card">
                    <h3>Budget Progress</h3>
                    </div>

                <div class="stats-card">
                    <h3>Recent Transactions</h3>
                    <ul id="expense-list"></ul>
                </div>
            </section>

        </div>
    </div>

    <div id="loader" style="display:none;">
        <div class="spinner"></div>
    </div>
    <div id="toast-container"></div>

    <script src="script.js"></script>
</body>
</html>
