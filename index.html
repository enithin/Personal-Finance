<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinSwift AI | Ultimate Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
    <div id="auth-container" class="container">
        <div class="stats-card auth-card">
            <h1>FinSwift AI</h1>
            <p id="auth-msg"></p>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password">
            <button onclick="handleAuth('login')">Sign In</button>
            <button onclick="handleAuth('signup')" class="secondary">Create Account</button>
            <div class="divider">OR</div>
            <button id="google-btn" class="google-style">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"> Google Login
            </button>
        </div>
    </div>

    <div id="app-container" class="container" style="display:none;">
        <header class="stats-card header-flex">
            <div id="user-profile">
                <img id="user-avatar" src="" alt="Profile">
                <span id="user-name">Welcome!</span>
            </div>
            <div class="header-actions">
                <button onclick="downloadPDF()" class="small-btn">📄 Export PDF</button>
                <button id="logout-btn" class="small-btn logout">Logout</button>
            </div>
        </header>

        <div class="grid">
            <section class="stack">
                <div class="stats-card balance-card">
                    <small>Monthly Net Balance</small>
                    <h2 id="net-balance">₹0.00</h2>
                </div>

                <div class="stats-card">
                    <h3>🔄 Recurring Bills</h3>
                    <div id="recurring-list"></div>
                    <div class="vibrant-form">
                        <input type="text" id="rec-name" placeholder="Netflix, Rent, etc.">
                        <input type="number" id="rec-amount" placeholder="Amount (₹)">
                        <button onclick="addRecurringBill()" style="background:#a855f7;">Add Bill</button>
                    </div>
                </div>

                <form id="income-form" class="stats-card">
                    <h3>💰 Add Income</h3>
                    <input type="text" id="inc-source" placeholder="Source" required>
                    <input type="number" id="inc-amount" placeholder="Amount (₹)" required>
                    <button type="submit" style="background:#10b981;">Save Income</button>
                </form>

                <form id="expense-form" class="stats-card">
                    <h3>💸 Add Expense</h3>
                    <input type="text" id="exp-desc" placeholder="Description" required>
                    <input type="number" id="exp-amount" placeholder="Amount (₹)" required>
                    <select id="exp-cat">
                        <option value="Food">Food</option>
                        <option value="Rent">Rent</option>
                        <option value="Bills">Bills</option>
                        <option value="Fun">Fun
